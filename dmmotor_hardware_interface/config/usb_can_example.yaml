# Example hardware configuration for DM motors using USB-CAN adapter
# This configuration uses WitMotion USB-CAN adapter

# CAN Interface Settings (USB-CAN)
can_interface:
  type: "usb_can"           # Interface type: "socketcan" or "usb_can"
  port: "/dev/ttyUSB0"      # Serial port for USB-CAN adapter
  serial_baudrate: 921600   # Serial port baudrate (default: 921600)
  can_baudrate: 1000000     # CAN bus baudrate in bps (1 Mbps)

# MIT Control Parameters
# These control the stiffness and damping of position control
# Higher kp = stiffer position control (faster response, may oscillate)
# Higher kd = more damping (slower response, more stable)
control_parameters:
  position_kp: 40.0         # Position proportional gain [0-500]
  position_kd: 1.0          # Position derivative gain [0-5]

# Motor Configuration for Each Joint
# motor_id: CAN ID of the motor (1-127)
# master_id: CAN ID for receiving feedback (typically 0 for all motors)
# motor_type: DM_J4310_2EC or DM4340
motors:
  joint1:
    motor_id: 1
    master_id: 0
    motor_type: "DM_J4310_2EC"

  joint2:
    motor_id: 2
    master_id: 0
    motor_type: "DM4340"

  joint3:
    motor_id: 3
    master_id: 0
    motor_type: "DM4340"

  joint4:
    motor_id: 4
    master_id: 0
    motor_type: "DM_J4310_2EC"

  joint5:
    motor_id: 5
    master_id: 0
    motor_type: "DM_J4310_2EC"

  joint6:
    motor_id: 6
    master_id: 0
    motor_type: "DM_J4310_2EC"

# Notes for USB-CAN:
# - Common serial ports: /dev/ttyUSB0, /dev/ttyACM0 (Linux), COM3 (Windows)
# - Supported serial baudrates: 9600, 19200, 38400, 57600, 115200, 230400, 460800, 921600
# - WitMotion USB-CAN adapter default: 921600 bps serial, 1000000 bps CAN
# - Make sure to give user permissions: sudo usermod -a -G dialout $USER
# - Or use udev rules to automatically set permissions
# - Ensure motor IDs are unique within the CAN network
# - master_id can be the same for all motors if using broadcast feedback
# - Adjust kp and kd based on your mechanical system and load
# - Start with conservative values and tune gradually
